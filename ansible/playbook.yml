---
# Playbook: Install and configure Zabbix Agent
# Purpose: Automates installation and configuration using auto-registration

- name: Install and configure Zabbix Agent
  hosts: all
  become: yes

  vars:
    zabbix_server_ip: "<ZABBIX_SERVER_IP>"
    host_metadata: "linux"

  tasks:

    - name: Update APT cache
      apt:
        update_cache: yes

    - name: Install Zabbix Agent
      apt:
        name: zabbix-agent
        state: present

    - name: Set Hostname automatically
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Hostname='
        line: "Hostname={{ ansible_hostname }}"

    - name: Set HostMetadata for auto-registration
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^HostMetadata='
        line: "HostMetadata={{ host_metadata }}"

    - name: Configure ServerActive
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server_ip }}"

    - name: Configure Server
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"

    - name: Restart and enable Zabbix Agent
      service:
        name: zabbix-agent
        state: restarted
        enabled: yes
